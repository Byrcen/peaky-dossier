<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>浴血黑帮 · 卷宗 / Peaky Blinders Dossier</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@500;600&family=Playfair+Display:wght@600;700&display=swap">
<style>
:root{--soot:#14110e;--board:#221c16;--frame:#34281c;--paper:#ece0c0;--ink:#2a2017;--ember:#c2592a;--amber:#e0a64e;--blood:#a3231d;--fog:#7d8287;--string:#7a342b;--brass:#c2922f;--manila:#dac8a0;--serif:Georgia,'Times New Roman',serif;--type:'Special Elite',Courier,monospace;--disp:'Playfair Display',Georgia,serif;--stencil:'Oswald',sans-serif}
*{box-sizing:border-box}
html,body{margin:0;background:#0c0a08;color:#e9dcc3;font-family:var(--serif)}
#app{max-width:1100px;margin:0 auto;position:relative}
.hidden{display:none!important}
#board{padding:0}
.cb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;padding:8px 10px;background:#17120d;border:1px solid var(--frame);border-bottom:none;border-radius:10px 10px 0 0}
.threads{display:flex;flex-wrap:wrap;gap:6px}
.thb{font-family:var(--stencil);font-size:12px;color:#cdbfa3;background:#241b12;border:1px solid #4a3a28;border-radius:6px;padding:5px 9px;cursor:pointer;display:flex;align-items:center;gap:6px}
.thb.active{color:#1a130c;background:var(--brass);border-color:var(--brass)}
.sb{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:0 10px 8px;background:#17120d;border-left:1px solid var(--frame);border-right:1px solid var(--frame)}
.sb .sblab{font-family:var(--type);font-size:11px;color:#8a7a5a;margin-right:4px}
.sgb{font-family:var(--type);font-size:12px;color:#cdbfa3;background:#1f1810;border:1px solid #4a3a28;border-radius:5px;padding:4px 11px;cursor:pointer}
.sgb.active{color:#1a130c;background:#cdbfa3;border-color:#cdbfa3}
.cf{width:370px;max-width:100%;background:var(--manila);border:1px solid #9a865d;border-radius:6px;overflow:hidden;font-family:var(--serif)}
.cf-top{display:flex;gap:12px;align-items:center;background:#241a10;padding:12px 14px}
.cf-pic{width:60px;height:60px;flex:none;border:1px solid #b6a47a;border-radius:4px;overflow:hidden}
.cf-pic svg{width:60px;height:60px;display:block}
.cf-nm{font-size:18px;font-weight:700;color:#f3e4c6;margin:0}
.cf-ro{font-family:var(--stencil);font-size:12px;color:#caa64a;margin-top:2px}
.cf-x{margin-left:auto;background:none;border:none;color:#caa64a;font-size:18px;cursor:pointer;align-self:flex-start}
.cf-b{padding:12px 16px 16px}
.cf-bio{font-size:14px;line-height:1.6;color:#2f2316;margin:0 0 10px}
.cf-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;font-family:var(--stencil);font-size:12px;color:#5a4326}
.cf-go{font-family:var(--stencil);font-size:14px;background:#7c1f17;color:#f3dec5;border:none;border-radius:6px;padding:11px 16px;cursor:pointer;width:100%}
.cf-go:hover{background:#9a2519}
.lensplay{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:8;font-family:var(--stencil);font-size:13px;background:#7c1f17;color:#f3dec5;border:1px solid #a3372a;border-radius:7px;padding:9px 18px;cursor:pointer}
.lensplay:hover{background:#9a2519}
.pin .seen{position:absolute;top:-8px;right:-8px;width:19px;height:19px;border-radius:50%;background:#3b7a4a;color:#eafff0;font-size:12px;line-height:19px;text-align:center;z-index:5;border:1px solid #1f4a2a}
.thb .seen{color:#7bd08c;margin-left:2px}
.mapbtn{font-family:var(--stencil);font-size:12px;color:#1a130c;background:#cdbfa3;border:1px solid #cdbfa3;border-radius:6px;padding:5px 11px;cursor:pointer}
.mapbtn:hover{background:#dccfa8}
.mutebtn{font-size:14px;line-height:1;background:#241b12;border:1px solid #4a3a28;border-radius:6px;padding:5px 9px;cursor:pointer}
.mutebtn:hover{background:#2e2316}
.rm{width:580px;max-width:100%;max-height:500px;overflow:auto;background:var(--manila);border:1px solid #9a865d;border-radius:6px;font-family:var(--serif)}
.rm-top{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;background:#241a10;color:#f3e4c6;padding:10px 14px;font-family:var(--stencil)}
.rm-x{background:none;border:none;color:#caa64a;font-size:18px;cursor:pointer}
.rm-b{padding:12px 16px 18px;color:#2f2316}
.rm-h{font-family:var(--stencil);font-size:13px;color:#7c1f17;border-bottom:1px solid #c2b083;padding-bottom:4px;margin:0 0 10px}
.ftree,.ftree ul{list-style:none;margin:0;padding:0}
.ftree ul{margin-left:16px;border-left:1px solid #b6a47a;padding-left:14px}
.ftree li{margin:5px 0}
.fnode{font-size:14px;color:#2f2316}
.fnode.froot{font-weight:700;font-size:15px}
.rel{font-family:var(--type);font-size:11px;color:#8a6a3a;margin-left:5px}
.facgrp{margin-bottom:11px}
.fachd{font-family:var(--stencil);font-size:13px;margin-bottom:5px}
.facmem{display:flex;flex-wrap:wrap;gap:5px}
.facm{font-size:12px;color:#2f2316;background:#e6d7b0;border:1px solid;border-radius:4px;padding:2px 8px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.lang{display:flex;border:1px solid #4a3a28;border-radius:6px;overflow:hidden}
.lang button{font-family:var(--serif);font-size:12px;color:#cdbfa3;background:#241b12;border:none;padding:5px 11px;cursor:pointer}
.lang button.active{background:var(--brass);color:#1a130c}
.bwrap{position:relative;height:520px;background:var(--board);border:1px solid var(--frame);border-radius:0 0 10px 10px;overflow:hidden}
.bframe{position:absolute;inset:7px;border:2px solid var(--frame);border-radius:4px;pointer-events:none}
svg.strings{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.pin{position:absolute;cursor:pointer;transition:opacity .25s;z-index:2}
.pin.dim{opacity:.15}.pin.act .frame,.pin.act .card{outline:2px solid #e3bb50;outline-offset:1px}
.tack{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;border:2px solid rgba(0,0,0,.4);z-index:4}
.photo .frame{width:86px;background:var(--paper);padding:5px 5px 0;border:1px solid #b6a47a}
.photo svg{display:block;width:86px;height:84px}
.cap{font-family:var(--type);font-size:11px;color:#2b2117;text-align:center;padding:3px 2px 4px;line-height:1.15}
.event .card{width:150px;background:#ded8c6;border:1px solid #b4ab90;padding:6px 8px;color:#1d1a12}
.ev-k{font-family:var(--stencil);font-size:10px;letter-spacing:1px;color:#7c1f17}
.ev-h{font-family:var(--disp);font-weight:700;font-size:13px;line-height:1.15;margin:2px 0}
#dossier{position:absolute;inset:0;background:rgba(11,8,5,.82);display:flex;align-items:center;justify-content:center;padding:18px;z-index:30}
.dz{width:440px;max-width:100%;background:var(--manila);border:1px solid #9a865d;border-radius:4px;overflow:hidden;font-family:var(--serif)}
.dz-top{position:relative;display:flex;align-items:center;gap:10px;background:#7c1f17;color:#f3dec5;padding:9px 12px;font-family:var(--stencil)}
.dz-no{font-size:12px;letter-spacing:1.5px}.dz-season{font-size:12px;opacity:.85}
.dz-x{margin-left:auto;background:none;border:none;color:#f3dec5;cursor:pointer;font-size:18px}
.dz-b{padding:12px 16px 16px}
.dz-y{font-family:var(--type);font-size:12px;color:#7c1f17}
.dz-tz{font-size:19px;font-weight:700;color:#241a10;margin:2px 0 0}
.dz-te{font-family:var(--stencil);font-size:13px;color:#5a4326;margin:1px 0 8px}
.dz-tx{font-size:14px;line-height:1.6;color:#2f2316;margin:0 0 10px}
.dz-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
.chip{font-family:var(--stencil);font-size:11px;background:#c7b485;color:#3a2c14;border:1px solid #ab986a;border-radius:4px;padding:2px 7px}
.dz-go{font-family:var(--stencil);font-size:13px;background:#241a10;color:#e7c98a;border:none;border-radius:5px;padding:8px 14px;cursor:pointer}
#scene{position:relative;height:600px;background:#0a0807;border:1px solid var(--frame);border-radius:10px;overflow:hidden}
.sc-art{position:absolute;inset:0;transform:scale(1.08);transition:transform 1.4s ease}
#scene.in .sc-art{transform:scale(1)}
.sc-art svg{width:100%;height:100%;display:block}
.sc-scrim{position:absolute;left:0;right:0;bottom:0;height:260px;background:rgba(8,6,5,.5);z-index:2}
.sc-lb{position:absolute;left:0;right:0;height:36px;background:#000;z-index:3}
.sc-lb.t{top:0}.sc-lb.b{bottom:0}
.sc-tag{position:absolute;top:48px;left:22px;font-family:var(--stencil);font-size:12px;letter-spacing:2px;color:#e7c98a;z-index:4}
.sc-num{position:absolute;top:44px;right:22px;font-family:var(--type);font-size:13px;color:#cbb78c;z-index:4}
.sc-cap{position:absolute;left:0;right:0;bottom:96px;padding:0 30px;z-index:4;opacity:0;transform:translateY(24px);transition:opacity 1s ease,transform 1s ease}
#scene.in .sc-cap{opacity:1;transform:none}
.sc-big{font-family:var(--disp);font-weight:700;font-size:28px;line-height:1.15;color:#f4ead7;margin:0 0 9px}
.sc-small{font-size:15px;line-height:1.6;color:#d9ccb4;max-width:620px;margin:0}
.sc-nav{position:absolute;bottom:46px;right:24px;display:flex;gap:8px;z-index:5}
.sc-nav button,.sc-back{font-family:var(--stencil);font-size:12px;color:#e7c98a;background:rgba(20,16,10,.7);border:1px solid #4a3a28;border-radius:6px;padding:7px 12px;cursor:pointer}
.sc-back{position:absolute;bottom:46px;left:24px;z-index:5}
#title{height:560px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--soot);border:1px solid var(--frame);border-radius:10px;text-align:center}
.t-h{font-family:var(--disp);font-weight:700;font-size:42px;color:#f4ead7;margin:0 0 6px}
.t-sub{font-family:var(--stencil);font-size:14px;letter-spacing:2px;color:#caa64a;margin-bottom:28px}
.t-start{font-family:var(--stencil);font-size:16px;color:#1a130c;background:var(--brass);border:none;border-radius:6px;padding:12px 26px;cursor:pointer;letter-spacing:1px}
.t-resume{display:block;margin-top:14px;font-family:var(--type);font-size:13px;color:#cbb78c;background:none;border:none;cursor:pointer;text-decoration:underline}
.sc-prop{position:absolute;z-index:7;width:56px;height:56px;transform:translate(-50%,-50%);cursor:pointer}
.sc-prop svg{width:56px;height:56px;display:block;position:relative;z-index:2;transition:transform .2s;background:rgba(8,6,4,.5);border-radius:50%;box-shadow:0 0 0 2px rgba(227,187,80,.55),0 2px 7px rgba(0,0,0,.6)}
.sc-prop:hover svg{transform:scale(1.18)}
.sc-prop .halo{position:absolute;inset:-9px;border-radius:50%;border:2px solid #e3bb50;z-index:1;animation:propPulse 1.9s ease-out infinite}
@keyframes propPulse{0%{transform:scale(.65);opacity:.75}70%{opacity:0}100%{transform:scale(1.5);opacity:0}}
.sc-prop .lab{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:var(--type);font-size:12px;color:#1a130c;background:#e3bb50;padding:3px 9px;border-radius:4px;opacity:0;transition:opacity .2s;pointer-events:none}
.sc-prop:hover .lab{opacity:1}
.sc-prev2{position:absolute;left:12px;top:50%;transform:translateY(-50%);z-index:6;font-size:34px;line-height:1;color:#caa64a;opacity:.28;cursor:pointer;background:none;border:none;padding:6px 10px}
.sc-prev2:hover{opacity:.75}
.sc-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:6;font-family:var(--type);font-size:12px;color:#cbb78c;opacity:.55;pointer-events:none}
@media (prefers-reduced-motion: reduce){.sc-art,#scene.in .sc-art,.sc-cap,#scene.in .sc-cap{transition:none!important;transform:none!important;opacity:1!important}.sc-prop .halo{animation:none!important;opacity:.5!important}}
</style>
</head>
<body>
<div id="app">
  <section id="title"></section>
  <section id="board" class="hidden"></section>
  <section id="scene" class="hidden"></section>
  <div id="dossier" class="hidden"></div>
</div>

function sfx(kind){ var ac=_ac(); if(!ac||state.muted)return; var t=ac.currentTime;
 function tone(f,d,ty,g,to){ var o=ac.createOscillator(),ga=ac.createGain(); o.type=ty||"square"; o.frequency.setValueAtTime(f,t); if(to)o.frequency.exponentialRampToValueAtTime(to,t+d); ga.gain.setValueAtTime(g||0.2,t); ga.gain.exponentialRampToValueAtTime(0.001,t+d); o.connect(ga);ga.connect(MG);o.start(t);o.stop(t+d); }
 function noise(d,g,filt){ var len=Math.floor(ac.sampleRate*d),b=ac.createBuffer(1,len,ac.sampleRate),dt=b.getChannelData(0); for(var i=0;i<len;i++)dt[i]=Math.random()*2-1; var n=ac.createBufferSource();n.buffer=b; var ga=ac.createGain();ga.gain.setValueAtTime(g||0.2,t);ga.gain.exponentialRampToValueAtTime(0.001,t+d); var fl=ac.createBiquadFilter();fl.type="lowpass";fl.frequency.value=filt||1400; n.connect(fl);fl.connect(ga);ga.connect(MG);n.start(t);n.stop(t+d); }

 var bases=[110,98,110,104,98,92,84,78],base=bases[season]||100;

  var sids={}; SCENES.forEach(function(s){ok(!sids[s.id],"SCENE id 重复:"+s.id);sids[s.id]=1;});
  var cids={}; CHARACTERS.forEach(function(c){ok(!cids[c.id],"CHAR id 重复:"+c.id);cids[c.id]=1;});
  SCENES.forEach(function(s){(s.cast||[]).forEach(function(id){ok(cids[id],"scene "+s.id+" 引用了不存在的人物 "+id);});});
  var pids={}; BOARD_PINS.forEach(function(p){pids[p.id]=1;});
  THREADS.forEach(function(t){
    (t.beatIds||[]).forEach(function(id){ok(sids[id],"thread "+t.id+" beatId 无效:"+id);});
    (t.pinIds||[]).forEach(function(id){ok(pids[id],"thread "+t.id+" pinId 无效:"+id);});
  });
  BOARD_PINS.forEach(function(p){
    if(p.kind==="photo") ok(cids[p.ref],"pin "+p.id+" ref 人物无效:"+p.ref);
    else ok(sids[p.ref],"pin "+p.id+" ref 场景无效:"+p.ref);
  });
  SCENES.forEach(function(s){ok(s.titleZh&&s.titleEn&&s.taleZh&&s.taleEn,"scene "+s.id+" 双语字段缺失");});
  ok(t("start")!=="start"&&t("start").length>0,"t(start) 应返回译文");
  lang="en"; ok(t("start")==="Press start","英文 t(start) 应为 Press start");
  lang="zh"; ok(t("nope_key")==="nope_key","缺失 key 应回退为 key 本身");
  var _bk=localStorage.getItem("pbd"), _bs=JSON.stringify(state);
  state.lastBeat="s3-grace"; state.lang="en"; save();
  state.lastBeat=null; state.lang="zh"; load();
  ok(state.lastBeat==="s3-grace","load 应恢复 lastBeat");
  ok(state.lang==="en","load 应恢复 lang");
  var _o=JSON.parse(_bs); for(var _k in state) delete state[_k]; for(var _k2 in _o) state[_k2]=_o[_k2]; lang=state.lang;
  if(_bk===null) localStorage.removeItem("pbd"); else localStorage.setItem("pbd",_bk);
  var ord=beatsInOrder();
  ok(ord[0]==="prologue"&&ord[ord.length-1]==="finale-end","时间序应 prologue→终幕");
  var to=threadOrder("sapphire");
  ok(to.length>=2&&to[0]==="s3-grace"&&to[to.length-1]==="s6-ruby","蓝宝石暗线序应 grace→ruby");
  return fails.length? ("FAIL("+fails.length+"): "+fails.join(" | ")) : "PASS";

function pinsForThread(thId){
 var m={}; if(thId==="all"){BOARD_PINS.forEach(function(p){m[p.id]=1;});return m;}
 var th=THREADS.filter(function(x){return x.id===thId;})[0];
 (th?th.pinIds:[]).forEach(function(id){m[id]=1;}); return m;
}
function pinInner(p){
 if(p.kind==="photo"){var c=charById(p.ref);
  return '<div class="frame"><svg viewBox="0 0 86 84"><rect width="86" height="84" fill="#d3c099"/>'+fig(c.portrait)+'</svg><div class="cap">'+(lang==="zh"?c.nameZh:c.nameEn)+'</div></div>';}
 var s=sceneById(p.ref);
 return '<div class="card"><div class="ev-k">'+s.year+' · '+t("caseFile")+' '+s.no+'</div><div class="ev-h">'+(lang==="zh"?s.titleZh:s.titleEn)+'</div></div>';
}
function pinRefScene(p){
 if(p.kind==="event")return p.ref;
 for(var i=0;i<SCENES.length;i++)if((SCENES[i].cast||[]).indexOf(p.ref)>-1)return SCENES[i].id;
 return SCENES[0].id;
}
function renderBoard(){
 var el=document.getElementById("board");
 var thbtns='<button class="thb" data-th="all">'+t("allThreads")+'</button>'+THREADS.map(function(th){
  var done=th.beatIds.every(function(x){return state.visited[x];});
  return '<button class="thb" data-th="'+th.id+'"><span class="dot" style="background:'+th.color+'"></span>'+(lang==="zh"?th.nameZh:th.nameEn)+(done?' <span class="seen">✓</span>':'')+'</button>';
 }).join("");
 var sgbtns=[1,2,3,4,5,6].map(function(n){return '<button class="sgb" data-s="'+n+'">S'+n+'</button>';}).join("");
 el.innerHTML='<div class="cb"><div class="threads">'+thbtns+'</div>'
  +'<div style="display:flex;gap:8px;align-items:center"><button class="mutebtn" aria-label="mute">'+(state.muted?"🔇":"🔊")+'</button><button class="mapbtn">'+(lang==="zh"?"关系图谱":"The web")+'</button><div class="lang"><button data-l="zh"'+(lang==="zh"?' class="active"':'')+'>中</button><button data-l="en"'+(lang==="en"?' class="active"':'')+'>EN</button></div></div></div>'
  +'<div class="sb"><span class="sblab">'+(lang==="zh"?"按季":"By series")+'</span>'+sgbtns+'</div>'
  +'<div class="bwrap" id="bwrap"><div class="bframe"></div><svg class="strings" id="strings"></svg><div id="pinlayer"></div><button class="lensplay hidden" id="lensplay"></button></div>';
 var pl=el.querySelector("#pinlayer");
 BOARD_PINS.forEach(function(p){
  var d=document.createElement("div");d.className="pin "+p.kind;d.dataset.pin=p.id;
  d.style.left=p.x+"%";d.style.top=p.y+"%";d.style.transform="translate(-50%,-50%) rotate("+p.rot+"deg)";
  var seenB=""; if(p.kind==="photo"){ var bb=beatsForChar(p.ref); if(bb.length&&bb.every(function(x){return state.visited[x];})) seenB='<span class="seen">✓</span>'; }
  d.innerHTML='<span class="tack" style="background:'+p.tack+'"></span>'+seenB+pinInner(p);
  d.addEventListener("click",function(){ if(p.kind==="photo") openCharFile(p.ref); else openDossier(p.ref); });
  pl.appendChild(d);
 });
 el.querySelectorAll(".thb").forEach(function(b){b.addEventListener("click",function(){filterThread(b.dataset.th);});});
 el.querySelectorAll(".lang button").forEach(function(b){b.addEventListener("click",function(){setLang(b.dataset.l);});});
 el.querySelector(".mapbtn").addEventListener("click",openRelMap);
 el.querySelector(".mutebtn").addEventListener("click",function(){setMuted(!state.muted);});
 el.querySelectorAll(".sgb").forEach(function(b){b.addEventListener("click",function(){filterSeason(parseInt(b.dataset.s,10));});});
 wireResize();
 filterThread(state.lastThread||"all");
}
function renderStrings(thId){
 var w=document.getElementById("bwrap"),svg=document.getElementById("strings");
 if(!w||!svg)return;
 if(w.clientWidth===0){ requestAnimationFrame(function(){renderStrings(thId);}); return; }
 svg.setAttribute("viewBox","0 0 "+w.clientWidth+" "+w.clientHeight);
 var lines=[];
 THREADS.forEach(function(th){ if(thId!=="all"&&th.id!==thId)return;
  for(var i=0;i<th.pinIds.length-1;i++)lines.push({a:th.pinIds[i],b:th.pinIds[i+1],c:th.color});
 });
 var h=lines.map(function(L){var A=pinById(L.a),B=pinById(L.b);if(!A||!B)return"";
  var ax=A.x/100*w.clientWidth,ay=A.y/100*w.clientHeight,bx=B.x/100*w.clientWidth,by=B.y/100*w.clientHeight;
  var mx=(ax+bx)/2,my=(ay+by)/2+22,sw=thId==="all"?1.8:2.6;
  return '<path d="M'+ax+' '+ay+' Q'+mx+' '+my+' '+bx+' '+by+'" fill="none" stroke="'+L.c+'" stroke-width="'+sw+'" stroke-linecap="round"/>'
   +'<circle cx="'+ax+'" cy="'+ay+'" r="2.6" fill="'+L.c+'"/><circle cx="'+bx+'" cy="'+by+'" r="2.6" fill="'+L.c+'"/>';
 }).join("");
 svg.innerHTML=h;
}
var _resizeWired=false;
function wireResize(){ if(_resizeWired)return; _resizeWired=true; window.addEventListener("resize",function(){ if(document.getElementById("bwrap")) renderStrings(state.lastThread||"all"); }); }
function filterThread(thId){
 state.lastThread=thId; state.season=null; save();
 document.querySelectorAll(".thb").forEach(function(b){b.classList.toggle("active",b.dataset.th===thId);});
 document.querySelectorAll(".sgb").forEach(function(b){b.classList.remove("active");});
 var m=pinsForThread(thId);
 document.querySelectorAll(".pin").forEach(function(el){var on=thId==="all"||m[el.dataset.pin];
  el.classList.toggle("dim",thId!=="all"&&!on);el.classList.toggle("act",thId!=="all"&&!!on);});
 renderStrings(thId);
 var lp=document.getElementById("lensplay");
 if(lp){ if(thId==="all"){ lp.classList.add("hidden"); } else { var th=THREADS.filter(function(x){return x.id===thId;})[0]; var n=th.beatIds.length; lp.innerHTML="▶ "+(lang==="zh"?("追这条线 · "+n+" 幕"):("Follow this thread · "+n)); lp.onclick=function(){playLens(threadOrder(thId),(lang==="zh"?th.nameZh:th.nameEn));}; lp.classList.remove("hidden"); } }
}
function filterSeason(sn){
 state.season=sn; state.lastThread=null; save();
 document.querySelectorAll(".sgb").forEach(function(b){b.classList.toggle("active",parseInt(b.dataset.s,10)===sn);});
 document.querySelectorAll(".thb").forEach(function(b){b.classList.remove("active");});
 BOARD_PINS.forEach(function(p){ var el=document.querySelector('.pin[data-pin="'+p.id+'"]'); if(!el)return;
  var inS=(p.kind==="photo")?(charById(p.ref).seasons.indexOf(sn)>-1):(sceneById(p.ref).season===sn);
  el.classList.toggle("dim",!inS); el.classList.remove("act"); });
 renderStrings("none");
 var lp=document.getElementById("lensplay");
 if(lp){ var n=beatsForSeason(sn).length; lp.innerHTML="▶ "+(lang==="zh"?("看 S"+sn+" · "+n+" 幕"):("Watch S"+sn+" · "+n)); lp.onclick=function(){playLens(beatsForSeason(sn),"S"+sn);}; lp.classList.remove("hidden"); }
}
function setLang(l){lang=l;state.lang=l;save();renderBoard();}
function threadsForScene(id){ var r=[]; THREADS.forEach(function(t){ if(t.beatIds.indexOf(id)>-1) r.push(t.id); }); return r; }
var curBeat=null;
function openCharFile(cid){
 var c=charById(cid); if(!c)return;
 var beats=beatsForChar(cid);
 var seen=beats.filter(function(b){return state.visited[b];}).length;
 var ths=THREADS.filter(function(th){ return th.beatIds.some(function(bid){ var sc=sceneById(bid); return sc&&(sc.cast||[]).indexOf(cid)>-1; }); });
 var thChips=ths.map(function(th){return '<span class="chip" style="background:'+th.color+';color:#fff;border-color:'+th.color+'">'+(lang==="zh"?th.nameZh:th.nameEn)+'</span>';}).join("");
 var d=document.getElementById("dossier");
 d.innerHTML='<div class="cf"><div class="cf-top"><div class="cf-pic"><svg viewBox="0 0 86 84"><rect width="86" height="84" fill="#d3c099"/>'+fig(c.portrait)+'</svg></div>'
  +'<div><p class="cf-nm">'+(lang==="zh"?c.nameZh:c.nameEn)+'</p><div class="cf-ro">'+(lang==="zh"?c.roleZh:c.roleEn)+'</div></div>'
  +'<button class="cf-x" aria-label="close">&times;</button></div>'
  +'<div class="cf-b"><p class="cf-bio">'+(lang==="zh"?c.bioZh:c.bioEn)+'</p>'
  +'<div class="cf-meta"><span>'+(lang==="zh"?("出现在 "+beats.length+" 幕 · 已读 "+seen+"/"+beats.length):(beats.length+" scenes · "+seen+"/"+beats.length+" seen"))+'</span>'+thChips+'</div>'
  +'<button class="cf-go">'+(lang==="zh"?("跟随 "+c.nameZh+" 的故事"):("Follow "+c.nameEn))+' &#9656;</button></div></div>';
 d.classList.remove("hidden");
 d.onclick=function(e){if(e.target===d)closeDossier();};
 d.querySelector(".cf-x").onclick=closeDossier;
 d.querySelector(".cf-go").onclick=function(){ var lb=(lang==="zh"?c.nameZh:c.nameEn); closeDossier(); playLens(beats,lb); };
}
function openDossier(sceneId){
 var s=sceneById(sceneId); if(!s)return; curBeat=sceneId;
 var cast=(s.cast||[]).map(function(id){var c=charById(id);return '<span class="chip">'+(lang==="zh"?c.nameZh:c.nameEn)+'</span>';}).join("");
 var ths=threadsForScene(sceneId).map(function(id){var th=THREADS.filter(function(x){return x.id===id;})[0];
  return th? '<span class="chip" style="background:'+th.color+';color:#fff;border-color:'+th.color+'">'+(lang==="zh"?th.nameZh:th.nameEn)+'</span>':"";}).join("");
 var d=document.getElementById("dossier");
 d.innerHTML='<div class="dz"><div class="dz-top"><span class="dz-no">'+t("caseFile")+' '+s.no+'</span>'
  +'<span class="dz-season">S'+s.season+' · '+s.year+'</span><button class="dz-x" aria-label="close">&times;</button></div>'
  +'<div class="dz-b"><div class="dz-y">'+s.year+'</div>'
  +'<p class="dz-tz">'+(lang==="zh"?s.titleZh:s.titleEn)+'</p>'
  +'<div class="dz-te">'+(lang==="zh"?s.titleEn:s.titleZh)+'</div>'
  +'<p class="dz-tx">'+(lang==="zh"?s.taleZh:s.taleEn)+'</p>'
  +'<div class="dz-meta"><span class="chip" style="background:none;border:none;color:#5a4326">'+t("appears")+':</span>'+cast+ths+'</div>'
  +'<button class="dz-go">'+t("openScene")+' &#9656;</button></div></div>';
 d.classList.remove("hidden");
 d.onclick=function(e){if(e.target===d)closeDossier();};
 d.querySelector(".dz-x").onclick=closeDossier;
 d.querySelector(".dz-go").onclick=function(){closeDossier();playLens([curBeat],(lang==="zh"?s.titleZh:s.titleEn));};

 "s6-boston":{kind:"coin",x:40,y:34,lz:"波士顿的交易",le:"the Boston deal"},
 "s6-curse":{kind:"gem",x:40,y:28,lz:"被诅咒的蓝宝石",le:"the cursed sapphire"},
 "s6-diagnosis":{kind:"bottle",x:60,y:28,lz:"医生的药瓶",le:"the doctor's vial"},
 "finale-end":{kind:"cap",x:50,y:30,lz:"故事待续 · 回到卷宗",le:"to be continued — to the board"},
 "s6-ruby":{kind:"gem",x:52,y:34,lz:"被诅咒的宝石",le:"the cursed stone"},
 "s6-finale":{kind:"match",x:30,y:40,lz:"点火的火柴",le:"the match"}
};
function seasonLabel(s){var z=["序幕","第一季","第二季","第三季","第四季","第五季","第六季","终幕"][s];
 var e=["Prologue","Series 1","Series 2","Series 3","Series 4","Series 5","Series 6","Finale"][s];
 return (lang==="zh"?z:e);}
function openScene(sceneId){ curBeat=sceneId; state.lastBeat=sceneId; state.visited[sceneId]=1; save();
 var _sc=sceneById(sceneId); startAmbient(_sc?_sc.season:0); sfx("enter");
 setView("scene"); renderScene(sceneId); }
function renderScene(sceneId){
 var s=sceneById(sceneId),el=document.getElementById("scene");
 var pm=PROP_MAP[sceneId]||{kind:"cap",x:50,y:66,lz:"继续",le:"continue"};
 var o=currentOrder(),i=o.indexOf(curBeat),hasPrev=i>0,last=(i>=o.length-1);
 var prog=lens.label?(lens.label+' · '+(i+1)+'/'+o.length):s.no;
 var propLab=last?(lang==="zh"?"读完 · 回到卷宗":"done — to the board"):(lang==="zh"?pm.lz:pm.le);
 el.classList.remove("in");
 el.innerHTML='<div class="sc-art">'+s.art+'</div><div class="sc-scrim"></div><div class="sc-lb t"></div><div class="sc-lb b"></div>'
  +'<div class="sc-tag">'+seasonLabel(s.season)+' · '+s.year+'</div><div class="sc-num">'+prog+'</div>'
  +'<div class="sc-cap"><p class="sc-big">'+(lang==="zh"?s.titleZh:s.titleEn)+'</p><p class="sc-small">'+(lang==="zh"?s.taleZh:s.taleEn)+'</p></div>'
  +'<button class="sc-back">&#9664; '+t("backBoard")+'</button>'
  +(hasPrev?'<button class="sc-prev2" aria-label="prev">&#8249;</button>':'')
  +'<div class="sc-prop" style="left:'+pm.x+'%;top:'+pm.y+'%"><div class="halo"></div><svg viewBox="0 0 44 44">'+propSvg(pm.kind)+'</svg><div class="lab">'+propLab+' &#8594;</div></div>'
  +'<div class="sc-hint">'+t("propHint")+'</div>';
 el.querySelector(".sc-back").onclick=function(){backToBoard();};
 var pv=el.querySelector(".sc-prev2"); if(pv)pv.onclick=function(){stepScene(-1);};
 el.querySelector(".sc-prop").onclick=function(){sfx(pm.kind);stepScene(1);};
 requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add("in");});});
}
var view="board";
function setView(v){
 view=v;
 var b=document.getElementById("board"),s=document.getElementById("scene");
 if(v==="scene"){ b.classList.add("hidden"); s.classList.remove("hidden"); }
 else { s.classList.add("hidden"); s.classList.remove("in"); b.classList.remove("hidden"); }
}
function beatsInOrder(){ return SCENES.map(function(s){return s.id;}); }
function threadOrder(thId){ var th=THREADS.filter(function(x){return x.id===thId;})[0]; return th?th.beatIds.slice():[]; }
function beatsForChar(cid){ return SCENES.filter(function(s){return (s.cast||[]).indexOf(cid)>-1;}).map(function(s){return s.id;}); }
function beatsForSeason(n){ return SCENES.filter(function(s){return s.season===n;}).map(function(s){return s.id;}); }
var lens={order:[],label:""};
function currentOrder(){ return lens.order.length? lens.order : beatsInOrder(); }
function playLens(order,label){ if(!order||!order.length)return; lens={order:order.slice(),label:label||""}; openScene(order[0]); }
function stepScene(d){
 var o=lens.order.length?lens.order:beatsInOrder(),i=o.indexOf(curBeat),n=i+d;
 if(n<0)return; if(n>=o.length){ backToBoard(); return; } openScene(o[n]);
}
function backToBoard(){ stopAmbient(); var sc=document.getElementById("scene"); sc.classList.add("hidden"); sc.classList.remove("in"); lens={order:[],label:""}; renderBoard(); document.getElementById("board").classList.remove("hidden"); view="board"; }
function renderTitle(){
 var el=document.getElementById("title");
 var resume=state.lastBeat? '<button class="t-resume">'+t("resume")+' &#8250;</button>':'';
 el.innerHTML='<h1 class="t-h">浴血黑帮 · 卷宗</h1><div class="t-sub">'+t("subtitle")+'</div>'
  +'<button class="t-start">'+t("start")+' &#9656;</button>'+resume
  +'<div class="lang" style="margin-top:22px"><button data-l="zh"'+(lang==="zh"?' class="active"':'')+'>中</button><button data-l="en"'+(lang==="en"?' class="active"':'')+'>EN</button></div>';
 el.querySelector(".t-start").onclick=function(){enterBoard();};
 var rb=el.querySelector(".t-resume"); if(rb)rb.onclick=function(){enterBoard();openScene(state.lastBeat);};
 el.querySelectorAll(".lang button").forEach(function(b){b.addEventListener("click",function(){lang=b.dataset.l;state.lang=lang;save();renderTitle();});});
}
function enterBoard(){ document.getElementById("title").classList.add("hidden"); renderBoard(); document.getElementById("board").classList.remove("hidden"); view="board"; }
function boot(){ load(); console.assert(__selftest()==="PASS","selftest"); renderTitle(); }
boot();
</script>
